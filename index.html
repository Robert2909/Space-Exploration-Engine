<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos Explorer 3D - Antigravity Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>

<body>
    <div id="ui-layer">
        <div id="crosshair">+</div>

        <div id="toggle-ui-btn"
            style="position: absolute; top: 20px; right: 20px; padding: 8px 12px; cursor: pointer; pointer-events: auto;">
            <span style="color: var(--keyword-color); font-size: 0.8rem; pointer-events: none;">import</span> <span
                style="color: var(--string-color); font-size: 0.8rem; pointer-events: none;">'UI'</span><span
                style="color: #ccc; font-size: 0.8rem; pointer-events: none;">;</span>
        </div>
        <div id="toggle-labels-btn"
            style="position: absolute; top: 60px; right: 20px; padding: 8px 12px; cursor: pointer; pointer-events: auto;">
            <span style="color: var(--keyword-color); font-size: 0.8rem; pointer-events: none;">import</span> <span
                style="color: var(--string-color); font-size: 0.8rem; pointer-events: none;">'Labels'</span><span
                style="color: #ccc; font-size: 0.8rem; pointer-events: none;">;</span>
        </div>

        <div id="hud">
            <div class="hud-panel">
                <h3>nave_exploradora</h3>
                <p><span class="prop-name">velocidad</span> <span class="prop-value" id="speed">0</span></p>
                <span class="small-text" style="color: var(--variable-color); margin-top: 5px;">coordenadas = {</span>
                <p style="padding-left: 15px;"><span class="prop-name">x</span> <span class="prop-value"
                        id="pos-x">0</span></p>
                <p style="padding-left: 15px;"><span class="prop-name">y</span> <span class="prop-value"
                        id="pos-y">0</span></p>
                <p style="padding-left: 15px;"><span class="prop-name">z</span> <span class="prop-value"
                        id="pos-z">0</span></p>
                <span class="small-text" style="color: var(--variable-color);">}</span>
                <span class="comment">[Click] volar | [ESC] soltar cursor | [Q/E] alabeo</span>
            </div>
            <div class="hud-panel">
                <h3>sistema_render</h3>
                <p><span class="prop-name">distanciaVisual</span> <span class="prop-value" id="dist-val">1</span></p>
                <input type="range" id="render-dist" min="1" max="10" value="3" style="pointer-events: auto;">
            </div>
        </div>

        <div id="labels-container"></div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
